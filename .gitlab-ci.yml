#
#   All available Hugo versions are listed under https://gitlab.com/pages/hugo/container_registry.
#
image: hugomods/hugo:node-non-root

stages:
  - build

pages:
  stage: build
  script:
    - npm ci
    - hugo
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
